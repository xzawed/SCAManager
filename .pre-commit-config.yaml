# pre-commit 훅 설정 — 시크릿 유출 3중 가드 Layer 1
# Pre-commit hook config — Secret leak prevention Layer 1
#
# 설치: pip install pre-commit && pre-commit install && pre-commit install --hook-type commit-msg
# Install: pip install pre-commit && pre-commit install && pre-commit install --hook-type commit-msg

repos:
  # Layer 1-A: gitleaks — 코드 diff + 커밋 메시지 시크릿 탐지
  # Layer 1-A: gitleaks — detects secrets in code diff AND commit messages
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: "🔐 gitleaks: 시크릿 패턴 스캔 (코드)"
        description: Detect hardcoded secrets in staged files

  # Layer 1-B: 커밋 메시지 본문 토큰 패턴 차단 (이번 사고 유형)
  # Layer 1-B: Block token patterns in commit message body (this incident type)
  - repo: local
    hooks:
      - id: check-commit-msg-secrets
        name: "🔐 커밋 메시지 시크릿 패턴 차단"
        language: pygrep
        entry: "[0-9]{8,12}:[A-Za-z0-9_-]{35,}"
        args: ["--multiline"]
        stages: [commit-msg]
        description: |
          Telegram Bot Token 형식이 커밋 메시지에 포함되면 차단.
          실제 값 대신 <REDACTED> 또는 *** 사용.

      - id: check-env-not-staged
        name: "🔐 .env 파일 커밋 차단"
        language: pygrep
        entry: "."
        files: "^\\.env$"
        stages: [pre-commit]
        description: .env 파일이 staged되면 커밋 차단.

      - id: check-secrets-in-diff
        name: "🔐 diff 내 주요 시크릿 패턴 차단"
        language: pygrep
        entry: "(?<![A-Za-z0-9_])(TELEGRAM_BOT_TOKEN|ANTHROPIC_API_KEY|GITHUB_CLIENT_SECRET|SESSION_SECRET|TOKEN_ENCRYPTION_KEY)\\s*=\\s*['\"]?[^${'\"\\s]{10,}"
        exclude: "^(README\\.md|README\\.ko\\.md|docs/|tests/|e2e/|\\.env\\.example)"
        stages: [pre-commit]
        description: |
          환경변수에 실제 값이 하드코딩된 경우 차단.
          os.getenv() 또는 os.environ 참조 방식만 허용.
          README/docs 는 문서 예시값 허용을 위해 제외.
          .env.example 제외 사유: placeholder 문서 파일 (README 동일 사유 — 2026-06-10,
          기존 placeholder 줄 your-telegram-bot-token/dev-secret-change-in-production 오탐.
          placeholder 를 빈 값/${...} 로 바꾸는 대안은 SESSION_SECRET 32자 validator 가
          `cp .env.example .env` dev flow 를 깨뜨려 기각. 실제 .env 는 Layer 1-B
          check-env-not-staged 훅이 staged 자체를 차단하고, gitleaks(Layer 1-A)와
          CI TruffleHog 는 .env.example 도 계속 스캔한다).
          tests/e2e 제외 사유: Python os.environ["KEY"] = "value" 형식은 값 앞뒤 따옴표로 인해
          패턴 [^${'"\s]{10,} 이 매칭되지 않아 실질적 탐지 불필요.
          단, .env 스타일 KEY=value (따옴표 없음) 형식은 매칭되므로 forward-looking 보호로 제외 유지.
          word-boundary 음수 lookbehind `(?<![A-Za-z0-9_])`: 상수 이름이 env 키를 접미사로 포함하는
          오탐 차단 (예: src/main.py `_DEFAULT_SESSION_SECRET = "dev-secret-change-in-production"` 의
          부분문자열 `SESSION_SECRET = "..."`). 실제 `SESSION_SECRET = "값"` 등 standalone 할당은 계속 탐지
          (2026-06-18 — 정규식 정밀도 향상, 탐지 약화 아님).

  # Layer 1-C: 기본 코드 품질 훅
  # Layer 1-C: Basic code quality hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
        name: "🔐 SSH/PEM 개인키 탐지"
