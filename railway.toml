[build]
builder = "NIXPACKS"
buildCommand = "npm install -g eslint@9 @typescript-eslint/parser @typescript-eslint/eslint-plugin && solc-select install 0.8.20 && solc-select use 0.8.20"

[deploy]
startCommand = "uvicorn src.main:app --host 0.0.0.0 --port $PORT --proxy-headers"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
