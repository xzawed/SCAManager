[build]
builder = "NIXPACKS"
buildCommand = "npm install -g eslint@9 @typescript-eslint/parser @typescript-eslint/eslint-plugin && solc-select install 0.8.20 && solc-select use 0.8.20 && gem install rubocop-ast -v 1.36.2 --no-document --bindir /usr/bin && gem install rubocop -v 1.57.2 --no-document --bindir /usr/bin && curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b /usr/bin v1.55.2"

[deploy]
startCommand = "uvicorn src.main:app --host 0.0.0.0 --port $PORT --proxy-headers"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# 주간 리포트: 매주 월요일 KST 09:00 = UTC 00:00 (0 0 * * 1)
# Weekly report: every Monday at KST 09:00 = UTC 00:00
[[deploy.cronJobs]]
schedule = "0 0 * * 1"
command = "curl -s -X POST -H 'X-API-Key: $INTERNAL_CRON_API_KEY' http://localhost:$PORT/api/internal/cron/weekly"

# 트렌드 체크: 매일 KST 12:00 = UTC 03:00 (0 3 * * *)
# Trend check: every day at KST 12:00 = UTC 03:00
[[deploy.cronJobs]]
schedule = "0 3 * * *"
command = "curl -s -X POST -H 'X-API-Key: $INTERNAL_CRON_API_KEY' http://localhost:$PORT/api/internal/cron/trend"

# CI-aware Auto Merge 재시도 — 5분마다 pending 큐 처리 (Phase 12 cron fallback)
# CI-aware Auto Merge retry — process pending queue every 5 min (Phase 12 cron fallback)
[[deploy.cronJobs]]
schedule = "*/5 * * * *"
command = "curl -s -X POST -H 'X-API-Key: $INTERNAL_CRON_API_KEY' http://localhost:$PORT/api/internal/cron/retry-pending-merges"

# Fallback B (Railway native cron 제한 시): cron-job.org 외부 → curl
# Fallback B (if Railway native cron is unavailable): use cron-job.org with:
#   POST https://<APP_BASE_URL>/api/internal/cron/weekly   (Header: X-API-Key: $INTERNAL_CRON_API_KEY)
#   POST https://<APP_BASE_URL>/api/internal/cron/trend    (Header: X-API-Key: $INTERNAL_CRON_API_KEY)
