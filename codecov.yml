coverage:
  status:
    project:
      default:
        # 전체 커버리지 95% 유지 목표 (현재 STATE.md 기준 96.2%)
        # Target: maintain overall coverage at 95%+ (current baseline 96.2% per STATE.md).
        target: 95%
        # 2% 이상 하락 시 CI 실패
        # CI fails if coverage drops by more than 2%.
        threshold: 2%
    patch:
      default:
        # PR 에서 추가된 라인의 커버리지 목표
        # Target coverage for lines added in a PR.
        target: 80%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

# 무시 경로 (테스트·마이그레이션·문서)
# Ignored paths (tests, migrations, docs).
ignore:
  - "tests/"
  - "e2e/"
  - "docs/"
  - "alembic/versions/"
  - "src/templates/"
  - "setup.py"
  # 사이클 93 Step 2 — src/scripts/ = production import X (사용자 로컬 1회 실행 도구).
  # Cycle 93 Step 2 — src/scripts/ is NOT a production import (local one-shot tool).
  # README.md 명시: "본 디렉토리는 production 의존성 X". coverage 측정 영역 외.
  - "src/scripts/"
