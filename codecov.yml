coverage:
  status:
    project:
      default:
        # 전체 커버리지 95% 유지 목표 (현재 STATE.md 기준 96.2%)
        target: 95%
        # 2% 이상 하락 시 CI 실패
        threshold: 2%
    patch:
      default:
        # PR 에서 추가된 라인의 커버리지 목표
        target: 80%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

# 무시 경로 (테스트·마이그레이션·문서)
ignore:
  - "tests/"
  - "e2e/"
  - "docs/"
  - "alembic/versions/"
  - "src/templates/"
  - "setup.py"
