name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Layer 2: CI 시크릿 스캔 — 커밋 메시지 + 코드 diff 동시 탐지
  # Layer 2: CI secret scan — detects secrets in both commit messages and code diffs
  secret-scan:
    name: TruffleHog secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for commit message scan)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog — PR 이벤트 시크릿 스캔
        # PR diff 범위만 스캔 — 2026-05-03 사고 유형 방어
        # Scans PR diff range only — guards against 2026-05-03 incident type
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: TruffleHog — push 이벤트 시크릿 스캔
        # before == zeros(첫 push / force-push) 시 invalid SHA 오류 방지를 위해 건너뜀
        # Skip when before is zeros (first push / force-push) to avoid invalid SHA error
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

  test-and-analyze:
    name: pytest + Codecov + SonarCloud
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout (with full history for SonarCloud)
        uses: actions/checkout@v6
        with:
          # SonarCloud 가 새 파일/변경 이력을 제대로 분석하려면 shallow-clone 금지
          # Full history required so SonarCloud can analyse new files and change history correctly.
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies (정적분석 도구)
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck cppcheck

      - name: Install Node.js (eslint)
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install global eslint
        run: npm install -g eslint@9 @typescript-eslint/parser @typescript-eslint/eslint-plugin

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage (XML for Codecov + SonarCloud)
        env:
          # conftest.py 에서 setdefault 되지만 CI 환경이라 중복 안전
          # Also set by conftest.py via setdefault, but harmlessly redundant in CI.
          DATABASE_URL: "sqlite:///:memory:"
          GITHUB_WEBHOOK_SECRET: "test_secret"
          TELEGRAM_BOT_TOKEN: "123:ABC"
          TELEGRAM_CHAT_ID: "-100123"
          SESSION_SECRET: "test-session-secret-32-chars-long!"
        run: |
          python -m pytest tests/ \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=pytest-results.xml \
            -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: SonarCloud scan
        # Dependabot PR 는 GitHub 보안 정책상 SONAR_TOKEN 시크릿에 접근 불가 — 건너뜀
        # Dependabot PRs cannot access SONAR_TOKEN due to GitHub security policy — skip.
        if: github.actor != 'dependabot[bot]'
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # SKIP LOCKED 동시성 증명 — Postgres service container (SQLite 미지원 FOR UPDATE SKIP LOCKED).
  # claim_batch 의 SKIP LOCKED 회귀를 CI 에서 실측 차단 (Theme B S3). test-and-analyze 와 병렬(needs: secret-scan).
  # SKIP LOCKED concurrency proof — needs a real Postgres (SQLite has no FOR UPDATE SKIP LOCKED).
  pg-concurrency:
    name: PG SKIP LOCKED concurrency
    runs-on: ubuntu-latest
    needs: secret-scan
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: scatest
          POSTGRES_PASSWORD: scatest
          POSTGRES_DB: scatest
        ports:
          - 5432:5432
        # health-check 로 DB 준비 완료까지 대기 (부팅 ~20-40s)
        # Wait for DB readiness via health-check (boot ~20-40s)
        options: >-
          --health-cmd "pg_isready -U scatest"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run PG-only tests (SKIP LOCKED 동시성 + 마이그레이션 round-trip)
        # DATABASE_URL_TEST_POSTGRES 단일 env 가 필수 — DATABASE_URL 은 conftest.py 가 sqlite 로 덮어씀(무의미).
        # Only DATABASE_URL_TEST_POSTGRES matters — conftest.py overrides DATABASE_URL with sqlite.
        # 명시 파일 경로만 실행 — e2e/integration 혼입 방지 (testing.md 🔴 격리 규칙). --timeout=60 deadlock guard.
        # 순서: 동시성 테스트(drop_all cleanup) → round-trip(clean DB 에서 alembic from base) (사이클 157 #8).
        # Order: concurrency tests (drop_all cleanup) → round-trip (alembic from a clean base, Cycle 157 #8).
        env:
          DATABASE_URL_TEST_POSTGRES: "postgresql://scatest:scatest@localhost:5432/scatest"
        run: |
          python -m pytest \
            tests/integration/test_retry_concurrency_postgres.py \
            tests/unit/migrations/test_0020_round_trip.py::test_migration_alembic_round_trip \
            -v -rs --timeout=60
