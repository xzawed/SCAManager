name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 최소 권한 원칙 — GITHUB_TOKEN 을 읽기 전용으로 제한 (회고 P2 공급망 하드닝).
# 모든 job(secret-scan/lint-changed-tests/test-and-analyze/pg-concurrency)이 read 만 필요 — write 필요 step 없음.
# (SonarCloud PR 데코레이션은 SonarCloud GitHub App 경유 — GITHUB_TOKEN write 불필요.)
# Least-privilege — restrict GITHUB_TOKEN to read-only (retro P2 supply-chain hardening).
# All jobs need read only — no write step. (SonarCloud PR decoration goes via the SonarCloud
# GitHub App, not GITHUB_TOKEN.)
permissions:
  contents: read

jobs:
  # Layer 2: CI 시크릿 스캔 — 커밋 메시지 + 코드 diff 동시 탐지
  # Layer 2: CI secret scan — detects secrets in both commit messages and code diffs
  secret-scan:
    name: TruffleHog secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for commit message scan)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: TruffleHog — PR 이벤트 시크릿 스캔
        # PR diff 범위만 스캔 — 2026-05-03 사고 유형 방어
        # Scans PR diff range only — guards against 2026-05-03 incident type
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@f446421baf832d6356c42c1743d99abff52ff334  # v3.95.7 (SHA 핀 — 공급망 무결성, @main 가변 태그 위험 차단)
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: TruffleHog — push 이벤트 시크릿 스캔
        # before == zeros(첫 push / force-push) 시 invalid SHA 오류 방지를 위해 건너뜀
        # Skip when before is zeros (first push / force-push) to avoid invalid SHA error
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        uses: trufflesecurity/trufflehog@f446421baf832d6356c42c1743d99abff52ff334  # v3.95.7 (SHA 핀 — 공급망 무결성, @main 가변 태그 위험 차단)
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

  # PR 변경 test 파일 dead-symbol 차단 — 신규 미사용 import(F401)·변수(F841)가 main full-scan
  # CodeQL 에 사후 포착돼 별도 fix PR(#516/#517/#520/#521/#522)을 반복 유발한 cascade 근본 차단(회고 C1, A2: PR diff 한정).
  # Block dead imports/vars in PR-changed test files — newly introduced ones get caught post-merge by
  # the main full-scan CodeQL, causing recurring self-inflicted fix PRs (retro C1, A2 diff-scoped).
  lint-changed-tests:
    name: Lint changed test files (F401/F841 — C1)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install flake8
        # 버전 고정(requirements.txt 와 동일) + wheel-only — 재현성 + setup-script 실행 차단.
        # Pinned (matches requirements.txt) + wheel-only — reproducible + blocks setup-script execution.
        run: "pip install --only-binary=:all: flake8==7.3.0"

      - name: Lint PR-changed tests/ for dead symbols (F401/F841)
        # 🔴 --isolated 필수 — setup.cfg per-file-ignore(tests/*:F401,F841)를 우회. 없으면 검사 무력화(false-pass).
        # PR 변경 test 파일만 검사 — 기존 legacy 위반 무관, 신규 도입만 차단. 변경 없으면 통과.
        # --isolated bypasses the setup.cfg per-file-ignore (else it false-passes). PR-changed test files only.
        run: |
          base_sha="${{ github.event.pull_request.base.sha }}"
          changed=$(git diff --name-only --diff-filter=ACMR "$base_sha" HEAD -- 'tests/' | grep -E '\.py$' || true)
          if [ -z "$changed" ]; then
            echo "변경된 test 파일 없음 — skip / no changed test files"
            exit 0
          fi
          echo "검사 대상 / checking:"; echo "$changed"
          python -m flake8 --isolated --select=F401,F841 $changed

      - name: Block new dual-import in PR-changed tests (py/import-and-import-from — C2)
        # 🔴 신규 diff 한정 — PR 에서 ADDED 된 `from X import` 가 기존 `import X` 와 공존하는 경우만 차단.
        # #1023 형(test_config.py 이중 import → self-inflicted CodeQL)의 pre-merge 봉인(회고 2026-07-03 C2).
        # flake8 F401/F841 는 양쪽 import 모두 used 라 미검출 — 별도 stdlib 가드 필요. 기존 legacy idiom 무관.
        # Diff-scoped: only NEW `from X import` coexisting with an `import X` is blocked (retro C2, #1023 pattern).
        run: python scripts/check_dual_import.py "${{ github.event.pull_request.base.sha }}" HEAD

      - name: Block new noqa-hidden unused import in PR-changed tests (py/unused-import — 회고 2026-07-18 B)
        # 🔴 신규 diff 한정 — PR 에서 ADDED 된 `# noqa: F401` 은닉 import 만 차단(기존 ~115 legacy 무관).
        # flake8 F401 은 `# noqa` 를 존중 → side-effect ORM import 가 CodeQL main 스캔에만 노출(#540~545, 3회 재발).
        # 이 가드로 pre-merge 에 튜플-참조 패턴(`_FK_TARGET_MODELS`) 승격 강제 → 반응형 fix PR 종식.
        # Diff-scoped: only NEW noqa-hidden imports are blocked; flake8 respects noqa so CodeQL sees them post-merge.
        run: python scripts/check_noqa_sideeffect.py "${{ github.event.pull_request.base.sha }}" HEAD

      - name: Block new dead-code in PR-changed repositories/services (declared-but-unwired — 회고 2026-07-18 P1#9/14/15)
        # 🔴 신규 diff 한정 — ADDED 된 src/repositories·src/services 공개 함수가 src 내 AST 호출자 0 이면 차단.
        # #1060 find_orphaned 가 호출자 0 dead code 로 13 PR 생존(전 스위트 green 은폐) → #1073 뒤늦은 배선의 재발 봉인.
        # 의도적 미배선은 diff 에 `# unwired-ok: <name>` 마커로 예외(이월 추적). AST 참조라 docstring 멘션 오탐 없음.
        # Diff-scoped: new public repo/service funcs with 0 in-src AST callers are blocked (find_orphaned pattern).
        run: python scripts/check_dead_code.py "${{ github.event.pull_request.base.sha }}" HEAD

  # repo 무결성 stdlib 가드 CI 백스톱 (회고 2026-07-18 P2#36) — pre-commit 우회(--no-verify)·미설치 시에도 서버측 강제.
  # 4 whole-repo 상태 가드(docs↔README 배지·cycle-history TOC 앵커·config↔env-vars·RepoConfig 3-layer)는
  # pre-commit-only 라 우회 가능했다 → 의존성 0(stdlib)·초 단위 완료라 push+PR 양쪽 서버측 백스톱으로 승격.
  # (check_memory_refs=repo 밖 메모리 의존·check_bilingual_comments=staged-diff 기반은 제외 — CI whole-repo 부적합.)
  # Repo-integrity stdlib guard CI backstop — enforces server-side even when pre-commit is bypassed/uninstalled.
  repo-integrity:
    name: Repo integrity guards (stdlib backstop)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: STATE↔README 배지 수치 정합 (check_docs_sync)
        run: python scripts/check_docs_sync.py

      - name: cycle-history TOC 앵커 정합 (check_toc_anchors)
        run: python scripts/check_toc_anchors.py

      - name: architecture 트리 싱크 (check_architecture_tree_sync)
        run: python scripts/check_architecture_tree_sync.py

      - name: 가드 fail-open floor (check_guard_fail_open)
        run: python scripts/check_guard_fail_open.py

      - name: config.py↔env-vars.md 싱크 (check_env_vars_sync)
        run: python scripts/check_env_vars_sync.py

      - name: RepoConfig 3-layer 싱크 (check_config_5way_sync)
        run: python scripts/check_config_5way_sync.py

  # 🔴 src/ 정적 분석 게이트 — 이전엔 **어떤 자동면에도 없었다** (회고 2026-07-03 D13).
  # `make lint`/`make gate` 는 pylint·flake8·bandit 를 전부 `|| true` 로 삼켜 **실패할 수 없고**,
  # `make lint-strict`(fail-under 9.90)는 CI·pre-commit 어디서도 호출되지 않는 문서-only 였다.
  # 그 상태에서 CLAUDE.md 는 "Phase 완료 조건 = /lint 통과" 를 선언했다 — 즉 커밋 본문의
  # "lint 통과" 주장이 **기계로 검증 불가**했다. 로컬 fail-closed 는 강제력이 아니라 마찰이므로
  # (Grok 적대 검토 2026-07-20), 실제 게이트를 **여기** 둔다.
  # Static-analysis gate for src/: previously enforced on NO automated surface — the Makefile
  # swallowed every linter with `|| true` and lint-strict was never wired. Local fail-closed is
  # friction, not enforcement; the real gate belongs in CI.
  #
  # 🔴 flake8 전체는 의도적 제외 — 현재 src/ 에 E501(라인 길이) 계열 15건이 있고, 이를 강제하면
  # 12개 파일을 미용 목적으로 고쳐야 한다. 정책 17(안정성 > 권장 규격) + "과한 게이트는 사람이
  # 게이트를 끄게 만든다". F401/F841(실질 결함)은 기존 lint-changed-tests job 이 이미 담당한다.
  lint-src:
    name: Static analysis gate (pylint + bandit on src/)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # 회귀 가드 — 현재 10.00/10. floor 9.90 은 보수적(사이클 87 Tier B-1 기준 유지).
      # Regression guard — currently 10.00/10; the 9.90 floor is deliberately conservative.
      - name: pylint 회귀 가드 (fail-under 9.90)
        run: pylint --fail-under=9.90 src/

      # 보안 정적 분석 — nosec 주석은 통과, 신규 미주석 findings 는 fail.
      # Security static analysis; annotated nosec passes, new unannotated findings fail.
      - name: bandit 보안 스캔
        run: bandit -r src/ -q

  # 의존성 취약점 SCA 게이트 — PyPI Advisory DB(OSV) 대조로 known CVE 차단(회고 2026-07-03 C7).
  # requirements 가 == 핀(CI==Railway 버전 일치)이므로 스캔 대상 = 실제 배포 버전. 신규 CVE 발표 시 CI fail →
  # 의존성 bump 강제(현재 취약점 0 실측). 프로덕션+개발 의존성 모두 대상.
  # Dependency SCA gate — blocks known CVEs via PyPI Advisory DB (OSV) (retro 2026-07-03 C7).
  # requirements are == pinned (CI==Railway versions), so the scan targets the actual deployed set.
  dependency-audit:
    name: pip-audit (SCA — 의존성 취약점 게이트)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: "pip install --only-binary=:all: pip-audit==2.10.1"

      - name: Audit requirements for known vulnerabilities
        # -r 로 requirements 파일 직접 스캔(설치 불필요). vuln 발견 시 exit 1 → CI fail(게이트).
        # Scan requirements files directly (no install). Non-zero exit on any vuln → gate.
        #
        # 🔴 --ignore-vuln 4건 = semgrep 이 강제하는 transitive 핀 (2026-07-17).
        # semgrep==1.169.0 이 `mcp==1.23.3`(정확 핀) + `click~=8.1.8` 을 요구한다. 최신
        # semgrep 1.170.0 도 동일 핀이라 **버전 업으로 해결 불가** — 우리가 고를 수 있는
        # semgrep 버전 중 패치본이 없다. 4건 모두 우리 사용 방식에선 **도달 불가**:
        #   · semgrep 은 `["semgrep","scan","--config=p/default","--json",…]` 비대화형 CLI
        #     subprocess 로만 호출(src/analyzer/io/tools/semgrep.py) — MCP 서버 미기동.
        #   · CVE-2026-52870 = `server.experimental.enable_tasks()` 전제 → 전 코드 0건.
        #   · CVE-2026-52869 = SSE/StreamableHTTP 서버 트랜스포트 전제 → 전 코드 0건.
        #   · CVE-2026-59950 = `mcp.server.websocket.websocket_server` 전제 → 전 코드 0건.
        #   · PYSEC-2026-2132 = `click.edit()` 명령 주입 전제 → 전 코드 0건.
        # (src/mcp/ 는 스키마 선언만 있는 별개 모듈로 semgrep 의 mcp 패키지와 무관.)
        #
        # 🔴 재검토 조건 (충족 시 해당 ID 를 즉시 제거할 것):
        #   (1) semgrep 이 mcp 핀을 >=1.27.2 / click 핀을 >=8.3.3 으로 올리면 → 전부 제거
        #   (2) 우리가 MCP **서버**를 실제 기동하게 되면 (enable_tasks / HTTP·WS 트랜스포트)
        #       → mcp 3건 즉시 제거 (도달 불가 근거가 무효화됨)
        #   (3) click.edit() 를 쓰게 되면 → PYSEC-2026-2132 즉시 제거
        # 이 목록은 "방치되면 썩는" 자산이다 — 신규 ID 를 습관적으로 추가하지 말 것.
        # 다른 CVE 는 계속 게이트로 차단된다 (ignore 는 명시 4건 한정).
        #
        # 🔴 --ignore-vuln (4 IDs) = transitive pins forced by semgrep (2026-07-17).
        # semgrep==1.169.0 requires `mcp==1.23.3` (exact) + `click~=8.1.8`; the latest semgrep
        # (1.170.0) pins identically, so no bump fixes this. All 4 are unreachable in our usage:
        # semgrep runs only as a non-interactive CLI subprocess (never an MCP server), and
        # enable_tasks / SSE / StreamableHTTP / websocket_server / click.edit appear 0 times in
        # our tree. Remove any ID the moment its precondition becomes true (see conditions above).
        # Every other CVE still fails the gate — this ignore list is exactly 4 entries.
        run: |
          python -m pip_audit -r requirements.txt -r requirements-dev.txt --desc on \
            --ignore-vuln CVE-2026-52870 \
            --ignore-vuln CVE-2026-52869 \
            --ignore-vuln CVE-2026-59950 \
            --ignore-vuln PYSEC-2026-2132

  test-and-analyze:
    name: pytest + Codecov + SonarCloud
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout (with full history for SonarCloud)
        uses: actions/checkout@v7
        with:
          # SonarCloud 가 새 파일/변경 이력을 제대로 분석하려면 shallow-clone 금지
          # Full history required so SonarCloud can analyse new files and change history correctly.
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies (정적분석 도구)
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck cppcheck

      - name: Install Node.js (eslint)
        uses: actions/setup-node@v7
        with:
          node-version: "20"

      - name: Install global eslint
        run: npm install -g eslint@9 @typescript-eslint/parser @typescript-eslint/eslint-plugin

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --retries 5 --timeout 60 -r requirements-dev.txt

      - name: Run pytest with coverage (XML for Codecov + SonarCloud)
        env:
          # conftest.py 에서 setdefault 되지만 CI 환경이라 중복 안전
          # Also set by conftest.py via setdefault, but harmlessly redundant in CI.
          DATABASE_URL: "sqlite:///:memory:"
          GITHUB_WEBHOOK_SECRET: "test_secret"
          TELEGRAM_BOT_TOKEN: "123:ABC"
          TELEGRAM_CHAT_ID: "-100123"
          SESSION_SECRET: "test-session-secret-32-chars-long!"
        run: |
          python -m pytest tests/ \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=pytest-results.xml \
            -rs -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: SonarCloud scan
        # Dependabot PR 는 GitHub 보안 정책상 SONAR_TOKEN 시크릿에 접근 불가 — 건너뜀
        # Dependabot PRs cannot access SONAR_TOKEN due to GitHub security policy — skip.
        if: github.actor != 'dependabot[bot]'
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # SKIP LOCKED 동시성 증명 — Postgres service container (SQLite 미지원 FOR UPDATE SKIP LOCKED).
  # claim_batch 의 SKIP LOCKED 회귀를 CI 에서 실측 차단 (Theme B S3). test-and-analyze 와 병렬(needs: secret-scan).
  # SKIP LOCKED concurrency proof — needs a real Postgres (SQLite has no FOR UPDATE SKIP LOCKED).
  pg-concurrency:
    # job name 은 step(SKIP LOCKED + round-trip)을 모두 반영 — 사이클 157 #8 에서 round-trip 추가됐으나
    # 명칭이 미반영이라 GitHub checks UI 에서 round-trip 회귀 담당이 가려졌음 (사이클 159 — 158 회고 P2).
    # main 은 branch protection 미적용 — required-check 명 변경 영향 없음(2026-06-03 실측 확인).
    name: PG-only tests (SKIP LOCKED + migration round-trip)
    runs-on: ubuntu-latest
    needs: secret-scan
    services:
      postgres:
        # minor 핀 — `postgres:16` 은 패치 릴리스마다 silently 변경됨. 이 job 은 FOR UPDATE
        # SKIP LOCKED + alembic ALTER constraint 등 PG 버전 민감 동작을 검증하므로 재현성을
        # 위해 minor 고정 (사이클 159 — 158 회고 P2). 주기적으로 최신 16.x 로 bump 권장.
        # Minor pin for reproducibility — `postgres:16` drifts on each patch release.
        image: postgres:16.4
        env:
          POSTGRES_USER: scatest
          POSTGRES_PASSWORD: scatest
          POSTGRES_DB: scatest
        ports:
          - 5432:5432
        # health-check 로 DB 준비 완료까지 대기 (부팅 ~20-40s)
        # Wait for DB readiness via health-check (boot ~20-40s)
        options: >-
          --health-cmd "pg_isready -U scatest"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --retries 5 --timeout 60 -r requirements-dev.txt

      - name: Run PG-only tests (SKIP LOCKED 동시성 + 마이그레이션 round-trip)
        # DATABASE_URL_TEST_POSTGRES 단일 env 가 필수 — DATABASE_URL 은 conftest.py 가 sqlite 로 덮어씀(무의미).
        # Only DATABASE_URL_TEST_POSTGRES matters — conftest.py overrides DATABASE_URL with sqlite.
        # 명시 파일 경로만 실행 — e2e/integration 혼입 방지 (testing.md 🔴 격리 규칙). --timeout=60 deadlock guard.
        # 순서: 동시성 테스트(drop_all cleanup) → round-trip (사이클 157 #8). round-trip 은 사이클 159 부터
        #   DROP/CREATE SCHEMA 로 self-isolating — 순서·선행 cleanup 에 의존하지 않는다 (158 회고 P2).
        # 🔴 round_trip 파일에 PG 전용 테스트를 추가하면 아래 ::node-id 핀에 함께 등재해야 자동 수집됨
        #    (node-id 고정이라 신규 테스트는 자동 미수집 — 사이클 159 cross-verify 신규).
        # Order: concurrency → round-trip (self-isolating since Cycle 159). Add new PG-only tests in
        #   test_0020_round_trip.py to the ::node-id pin below, else they won't be collected.
        env:
          DATABASE_URL_TEST_POSTGRES: "postgresql://scatest:scatest@localhost:5432/scatest"
        run: |
          python -m pytest \
            tests/integration/test_retry_concurrency_postgres.py \
            tests/integration/test_retention_sweep_postgres.py \
            tests/unit/migrations/test_0020_round_trip.py::test_migration_alembic_round_trip \
            tests/unit/migrations/test_0020_round_trip.py::test_migration_0041_force_round_trip_postgres \
            tests/unit/migrations/test_0020_round_trip.py::test_migrations_idempotent_over_prod_drift_postgres \
            tests/unit/migrations/test_orm_alembic_parity.py::test_orm_metadata_matches_migrations \
            -v -rs --timeout=60
