# Dependabot configuration for SCAManager
# 사이클 86 신설 (2026-05-06) — GitHub Auto-Injected `submit-pypi` workflow 영구 timeout 대응:
# 2026-04-23 GitHub Changelog "Dependabot-based dependency graphs for Python" 신규 도입에 따라
# Dependabot 활성 시 Auto-Injected submit-pypi 가 supersede 됨 (관점 4+5 검증).
#
# 정책 정합:
# - 정책 12 (MCP scope): GitHub Settings UI 변경은 사용자 영역. 본 dependabot.yml 신설은 Claude scope.
# - 정책 16 (단순화 default): 단일 ecosystem (pip) + weekly + open-PR 한도 = minimal config.
# - 메모리 `feedback-log-first-debugging.md`: 추측 금지 — 5+1 다중 에이전트 검증 후 진행.
#
# 운영 영향:
# - Python 의존성 보안 알림 (Dependabot security updates) 자동 제공
# - 주간 Dependabot PR 발생 가능 (open-pull-requests-limit 으로 제어)
# - GitHub Dependency Graph 데이터 = Dependabot 기반 자동 갱신 (submit-pypi 폐기 후속)

version: 2
updates:
  # Python 의존성 (requirements.txt + requirements-dev.txt)
  # Python dependencies (Railway 자동 감지 + 개발 환경)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    # PR 누적 차단 — 동시 5개 한도 (운영 부담 ↓)
    # Cap concurrent PRs at 5 to limit operational overhead
    open-pull-requests-limit: 5
    # Security update 우선 — 일반 update 보조
    # Prioritize security updates over feature updates
    labels:
      - "dependencies"
      - "python"
    # 사이클 87 Tier B-2 — production vs development 분리 (회고 관점 1 P1)
    # 효과: minor/patch 일괄 묶음 → conflict 자동 해소 ROI ↑ + 머지 부담 ↓
    # major bump + security update = group 외 개별 PR (변경 로그 검토 의무 페어)
    # Cycle 87 Tier B-2 — split production vs development (retro perspective 1 P1)
    # Effect: minor/patch grouped → fewer conflicts + less merge overhead
    # major bump + security updates = individual PRs (changelog review pair)
    groups:
      production-deps:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-deps:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # npm 의존성 (package.json + package-lock.json — scamanager-ui Tailwind/eslint 빌드 툴체인)
  # npm dependencies (UI build toolchain — all devDependencies, not shipped at runtime)
  # 2026-07-22 회고 P1-④ 사용자 결정: monitor-only (fail-closed CI 게이트 대신 dependabot 감시).
  #   사유 = devDeps·빌드/lint 전용이라 런타임 노출 낮음(정책 17 안정성>규격). pip 축과 대칭
  #   커버리지를 확보하되 빌드 차단 마찰은 만들지 않음. #1169(brace-expansion) 같은 반응형 fix 예방.
  # 2026-07-22 retro P1-④ user decision: monitor-only (dependabot watch instead of a fail-closed CI gate).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    # npm 의존성은 전부 devDependencies (tailwindcss·eslint) — dev 묶음만.
    # All npm deps are devDependencies (tailwindcss·eslint) — group dev minor/patch.
    groups:
      npm-dev:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions (workflows 의존성)
  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    # 사이클 87 Tier B-2 — github-actions 도 minor/patch 묶음 (major = 개별 검토)
    # Cycle 87 Tier B-2 — github-actions minor/patch grouping (major = individual review)
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
